<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#111111">
  <meta name="description" content="소중한 분들을 저희의 시작에 초대합니다.">
  <meta property="og:type" content="website">
  <meta property="og:title" content="신랑 · 신부 결혼합니다">
  <meta property="og:description" content="소중한 분들을 저희의 시작에 초대합니다.">
  <meta property="og:image" content="https://hittto.github.io/assets/placeholder-photo-wide.svg">
  <meta property="og:url" content="https://hittto.github.io/">
  <title>신랑 · 신부 결혼합니다</title>
  <link rel="preconnect" href="https://cdn.jsdelivr.net">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main id="invitation" class="invitation" aria-live="polite">
    <div class="loading-card">
      <span class="loading-heart">♥</span>
      <p>초대장을 준비하고 있어요</p>
    </div>
  </main>

  <div class="lightbox" id="lightbox" aria-hidden="true" role="dialog" aria-label="사진 크게 보기">
    <button class="lightbox-close" type="button" aria-label="닫기">×</button>
    <button class="lightbox-nav lightbox-prev" type="button" aria-label="이전 사진">‹</button>
    <img id="lightbox-image" alt="갤러리 사진 크게 보기">
    <button class="lightbox-nav lightbox-next" type="button" aria-label="다음 사진">›</button>
    <p class="lightbox-count" id="lightbox-count"></p>
  </div>

  <div class="toast" id="toast" role="status"></div>
  <script src="app.js" defer></script>
</body>
</html>
