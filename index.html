<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>신랑 · 신부 결혼합니다</title>
<meta property="og:type" content="website">
<meta property="og:title" content="신랑 · 신부 결혼합니다">
<meta property="og:description" content="소중한 분들을 저희의 시작에 초대합니다.">
<meta property="og:image" content="">
<meta property="og:url" content="https://hittto.github.io/">
<meta name="description" content="소중한 분들을 저희의 시작에 초대합니다.">
<meta name="theme-color" content="#f4879f">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Gowun+Batang:wght@400;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --accent:#c48d7e;
  --accent-soft:#f3e2dc;
  --ink:#4a4441;
  --ink-soft:#8a807b;
  --paper:#fffdfb;
  --line:#eee2dc;
  --serif:'Gowun Batang','Nanum Myeongjo',serif;
  --sans:'Noto Sans KR',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
html{-webkit-text-size-adjust:100%}
body{
  background:#f3ede8;
  font-family:var(--serif);
  color:var(--ink);
  line-height:1.7;
  word-break:keep-all;
}
body.font-sans{font-family:var(--sans)}
#wrap{
  max-width:430px;margin:0 auto;background:var(--paper);
  box-shadow:0 0 40px rgba(90,70,60,.12);
  min-height:100vh;overflow-x:hidden;position:relative;
}
img{max-width:100%;display:block}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
section{padding:70px 28px;position:relative}
.eyebrow{
  font-family:var(--sans);font-size:11px;letter-spacing:.35em;
  color:var(--accent);text-align:center;text-transform:uppercase;
  margin-bottom:10px;font-weight:500;
}
.sec-title{
  font-size:21px;text-align:center;margin-bottom:34px;font-weight:700;
  color:var(--ink);
}
.divider{width:1px;height:34px;background:var(--accent);opacity:.45;margin:0 auto 18px}
.reveal{opacity:0;transform:translateY(26px);transition:opacity .9s ease,transform .9s ease}
.reveal.on{opacity:1;transform:none}

/* ─── 커버 ─── */
#cover{padding:0}
.cover-photo{position:relative;width:100%;aspect-ratio:3/4;overflow:hidden}
.cover-photo img{width:100%;height:100%;object-fit:cover}
.ph{
  width:100%;height:100%;display:flex;flex-direction:column;gap:8px;
  align-items:center;justify-content:center;text-align:center;
  background:linear-gradient(160deg,#f9ece7 0%,#eed4cb 55%,#e5c3b8 100%);
  color:#a67a6c;font-family:var(--sans);
}
.ph .ph-icon{font-size:34px}
.ph .ph-t{font-size:14px;font-weight:500}
.ph .ph-s{font-size:11px;opacity:.75}
.cover-text{text-align:center;padding:52px 24px 58px}
.cover-script{
  font-family:var(--sans);font-size:11px;letter-spacing:.45em;color:var(--accent);
  text-transform:uppercase;margin-bottom:22px;
}
.cover-date{font-size:17px;letter-spacing:.02em;margin-bottom:14px}
.cover-venue{font-size:15px;color:var(--ink)}
.cover-addr{font-size:12.5px;color:var(--ink-soft);margin-top:6px;font-family:var(--sans);font-weight:300}

/* ─── 신랑 신부 ─── */
#intro{padding-top:0}
.intro-photo{width:100%;aspect-ratio:4/3;overflow:hidden;border-radius:6px}
.intro-photo img{width:100%;height:100%;object-fit:cover}
.names{display:flex;justify-content:center;gap:0;margin-top:44px;text-align:center}
.name-col{flex:1;max-width:170px}
.name-col .role{
  font-family:var(--sans);font-size:10.5px;letter-spacing:.4em;color:var(--accent);
  text-transform:uppercase;margin-bottom:12px;
}
.name-col .en{font-size:17px;line-height:1.45;margin-bottom:6px}
.name-col .kr{font-size:13px;color:var(--ink-soft)}
.name-sep{width:1px;background:var(--line);margin:6px 18px}

/* ─── 인사말 ─── */
#greeting{background:linear-gradient(180deg,var(--paper) 0%,#fbf4f0 50%,var(--paper) 100%)}
.greet-msg{text-align:center;font-size:15px;line-height:2.15;color:#5b534f}
.parents{margin-top:44px;display:flex;flex-direction:column;gap:12px;align-items:center}
.parent-line{font-size:15px;display:flex;align-items:baseline;gap:8px;flex-wrap:wrap;justify-content:center}
.parent-line .p-names{letter-spacing:.03em}
.parent-line .p-rel{font-size:12.5px;color:var(--ink-soft);font-family:var(--sans);font-weight:300}
.parent-line .p-me{font-weight:700;font-size:16px}
.contact-btns{display:flex;justify-content:center;gap:10px;margin-top:36px;flex-wrap:wrap}
.contact-btn{
  display:inline-flex;align-items:center;gap:7px;
  border:1px solid var(--line);border-radius:100px;padding:9px 18px;
  font-family:var(--sans);font-size:12.5px;color:var(--ink);background:#fff;
  text-decoration:none;
}
.contact-btn:active{background:var(--accent-soft)}

/* ─── 영상 ─── */
.video-box{position:relative;width:100%;aspect-ratio:16/9;border-radius:6px;overflow:hidden;background:#000}
.video-box iframe,.video-box video{position:absolute;inset:0;width:100%;height:100%;border:0}

/* ─── 갤러리 ─── */
#gallery{padding-left:14px;padding-right:14px}
.g-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
.g-item{aspect-ratio:1/1;overflow:hidden;border-radius:4px;padding:0;position:relative;background:#f4ebe6}
.g-item img{width:100%;height:100%;object-fit:cover;transition:transform .4s}
.g-item:active img{transform:scale(1.05)}
.g-item .ph .ph-icon{font-size:20px}
.g-item .ph .ph-t{font-size:10px}
.g-more{
  display:block;margin:26px auto 0;padding:11px 34px;border:1px solid var(--line);
  border-radius:100px;font-family:var(--sans);font-size:13px;color:var(--ink-soft);background:#fff;
}
/* 라이트박스 */
#lightbox{
  position:fixed;inset:0;background:rgba(20,15,13,.94);z-index:1000;
  display:none;align-items:center;justify-content:center;
}
#lightbox.open{display:flex}
#lightbox img{max-width:92vw;max-height:82vh;object-fit:contain;border-radius:4px}
.lb-btn{position:absolute;color:#fff;font-size:26px;padding:16px;opacity:.85;font-family:var(--sans)}
.lb-close{top:8px;right:8px}
.lb-prev{left:2px;top:50%;transform:translateY(-50%)}
.lb-next{right:2px;top:50%;transform:translateY(-50%)}
.lb-count{position:absolute;bottom:22px;left:50%;transform:translateX(-50%);color:#fff;font-family:var(--sans);font-size:12px;letter-spacing:.15em;opacity:.8}

/* ─── 캘린더 ─── */
#calendar{background:#fbf4f0}
.cal-box{max-width:300px;margin:0 auto;text-align:center}
.cal-date-main{text-align:center;font-size:28px;font-weight:700;letter-spacing:.08em;color:var(--ink);line-height:1.35}
.cal-sub{text-align:center;font-family:var(--sans);font-size:14px;font-weight:500;color:#5f5550;margin-top:7px;margin-bottom:30px}
.cal-month{font-size:21px;font-weight:700;margin-bottom:10px;color:var(--ink)}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;font-family:var(--sans)}
.cal-grid .dow{font-size:11px;color:var(--ink-soft);padding:6px 0}
.cal-grid .dow.sun{color:#d67b6d}
.cal-grid .day{font-size:13px;padding:8px 0;color:#6b625d;position:relative}
.cal-grid .day>span{position:relative;z-index:1}
.cal-grid .day.sun{color:#d67b6d}
.cal-grid .day.dim{opacity:0}
.cal-grid .day.dday{color:#fff;font-weight:700;isolation:isolate}
.cal-grid .day.dday::before{
  content:'';position:absolute;z-index:0;left:50%;top:50%;
  width:34px;height:34px;border-radius:50%;background:var(--accent);
  opacity:1;transform:translate(-50%,-50%) scale(1);
  box-shadow:0 0 0 3px var(--accent-soft);
}
#calendar.on .cal-grid .day.dday::before{animation:ddayCircleIn .9s cubic-bezier(.2,.85,.3,1.15) both}
@keyframes ddayCircleIn{
  0%{opacity:0;transform:translate(-50%,-50%) scale(.18);box-shadow:0 0 0 0 var(--accent-soft)}
  65%{opacity:1;transform:translate(-50%,-50%) scale(1.18);box-shadow:0 0 0 8px var(--accent-soft)}
  100%{opacity:1;transform:translate(-50%,-50%) scale(1);box-shadow:0 0 0 3px var(--accent-soft)}
}
@media(prefers-reduced-motion:reduce){#calendar.on .cal-grid .day.dday::before{animation:none}}
.countdown{display:flex;justify-content:center;gap:8px;margin-top:34px}
.cd-cell{
  background:#fff;border:1px solid var(--line);border-radius:8px;
  width:64px;padding:10px 0;text-align:center;font-family:var(--sans);
}
.cd-cell .n{font-size:20px;font-weight:500;color:var(--ink)}
.cd-cell .l{font-size:10px;color:var(--ink-soft);margin-top:2px}
.cd-msg{text-align:center;margin-top:22px;font-size:13.5px;color:#5b534f}
.cd-msg b{color:var(--accent)}

/* ─── 오시는 길 ─── */
.map-frame{position:relative;width:100%;aspect-ratio:4/3;overflow:hidden;border:0;border-radius:6px;background:#eee}
.map-frame>iframe{width:100%;height:100%;border:0}
.map-loading{position:absolute;inset:0;display:grid;place-content:center;color:var(--ink-soft);background:linear-gradient(145deg,#f4f1ef,#e8e2df);font:12px var(--sans)}
.map-provider{position:absolute;z-index:10;right:9px;bottom:9px;padding:5px 9px;border-radius:100px;color:#fff;background:rgba(46,42,40,.78);box-shadow:0 2px 8px rgba(0,0,0,.12);font:10px var(--sans);pointer-events:none}
.loc-name{text-align:center;font-size:16.5px;font-weight:700;margin-top:26px}
.loc-addr{text-align:center;font-size:13px;color:var(--ink-soft);font-family:var(--sans);font-weight:300;margin-top:6px}
.copy-sm{
  display:block;margin:14px auto 0;padding:7px 20px;border:1px solid var(--line);
  border-radius:100px;font-family:var(--sans);font-size:12px;color:var(--ink-soft);background:#fff;
}
.map-apps{display:flex;gap:8px;margin-top:22px}
.map-app{
  flex:1;text-align:center;padding:11px 0;border:1px solid var(--line);border-radius:8px;
  font-family:var(--sans);font-size:12.5px;color:var(--ink);text-decoration:none;background:#fff;
}
.guides{margin-top:34px;display:flex;flex-direction:column;gap:22px}
.guide .g-title{font-size:14.5px;font-weight:700;margin-bottom:6px}
.guide .g-desc{font-size:13.5px;color:#6b625d;font-family:var(--sans);font-weight:300;line-height:1.8;white-space:pre-line}

/* ─── 계좌 ─── */
#accounts{background:#fbf4f0}
.acc-group{margin-bottom:26px}
.acc-group:last-of-type{margin-bottom:0}
.acc-head{
  width:100%;text-align:left;padding:14px 18px;background:#fff;border:1px solid var(--line);
  border-radius:10px;font-size:14px;font-weight:700;display:flex;justify-content:space-between;align-items:center;
}
.acc-head .arrow{transition:transform .3s;color:var(--ink-soft);font-size:12px}
.acc-group.open .acc-head .arrow{transform:rotate(180deg)}
.acc-list{display:none;padding:4px 4px 0}
.acc-group.open .acc-list{display:block}
.acc-item{
  background:#fff;border:1px solid var(--line);border-radius:10px;padding:13px 16px;
  margin-top:8px;display:flex;justify-content:space-between;align-items:center;gap:10px;
}
.acc-info .a-num{font-family:var(--sans);font-size:13.5px;font-weight:500}
.acc-info .a-holder{font-family:var(--sans);font-size:12px;color:var(--ink-soft);margin-top:2px;font-weight:300}
.acc-copy{
  flex-shrink:0;padding:7px 14px;border-radius:8px;background:var(--accent-soft);
  font-family:var(--sans);font-size:11.5px;color:#9c6b5c;
}

/* ─── 공유 ─── */
#share{text-align:center;padding-bottom:54px}
.share-btn{
  display:block;width:100%;padding:14px 0;border-radius:10px;margin-bottom:10px;
  font-family:var(--sans);font-size:14px;font-weight:500;
}
.share-kakao{background:#fee500;color:#3c1e1e}
.share-copy{background:#fff;border:1px solid var(--line);color:var(--ink)}
footer{
  text-align:center;padding:26px 0 34px;font-family:var(--sans);
  font-size:11px;color:#b5aaa4;letter-spacing:.08em;background:#faf3ef;
}

/* ─── BGM ─── */
#bgmBtn{
  position:fixed;top:14px;right:14px;z-index:900;width:38px;height:38px;border-radius:50%;
  background:rgba(255,255,255,.85);backdrop-filter:blur(4px);
  box-shadow:0 2px 10px rgba(90,70,60,.2);font-size:15px;color:var(--accent);
  display:none;align-items:center;justify-content:center;
}
#bgmBtn.show{display:flex}
#bgmBtn.playing{animation:spin 6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ─── 토스트 ─── */
#toast{
  position:fixed;bottom:36px;left:50%;transform:translateX(-50%) translateY(20px);
  background:rgba(60,50,45,.92);color:#fff;font-family:var(--sans);font-size:13px;
  padding:11px 24px;border-radius:100px;opacity:0;transition:.35s;pointer-events:none;z-index:1100;
  white-space:nowrap;
}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ─── 청첩장 방문 잠금 ─── */
body.wedding-locked{overflow:hidden}
body.wedding-locked #wrap,body.wedding-locked #bgmBtn{visibility:hidden}
#weddingAccessGate{
  position:fixed;z-index:2000;inset:0;display:none;place-items:center;padding:24px;
  background:radial-gradient(circle at 50% 16%,#fffaf7 0%,#f3e5df 58%,#e8d4cc 100%);
  font-family:var(--sans);
}
body.wedding-locked #weddingAccessGate{display:grid}
.wedding-access-card{
  width:min(350px,100%);padding:34px 28px 28px;border:1px solid rgba(255,255,255,.75);
  border-radius:20px;background:rgba(255,253,251,.95);text-align:center;
  box-shadow:0 24px 70px rgba(83,61,51,.15);backdrop-filter:blur(12px);
}
.access-flower{font-size:30px;margin-bottom:12px}.wedding-access-card .eyebrow{margin-bottom:9px}
.wedding-access-card h1{font-family:var(--serif);font-size:22px;margin-bottom:10px;color:var(--ink)}
.wedding-access-card>p{font-size:12.5px;line-height:1.7;color:var(--ink-soft);margin-bottom:22px}
.wedding-access-card input{
  width:100%;padding:13px 14px;border:1px solid var(--line);border-radius:9px;background:#fff;
  color:var(--ink);font:14px var(--sans);text-align:center;outline:none;
}
.wedding-access-card input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
.wedding-access-card button{
  width:100%;margin-top:9px;padding:13px;border-radius:9px;color:#fff;background:var(--accent);
  font:500 13px var(--sans);
}
.wedding-access-error{min-height:19px;margin:8px 0 0!important;color:#b44d62!important;font-size:11px!important}
</style>
</head>
<body>
<div id="weddingAccessGate" role="dialog" aria-modal="true" aria-labelledby="weddingAccessTitle">
  <form class="wedding-access-card" id="weddingAccessForm">
    <div class="access-flower">🌸</div>
    <div class="eyebrow">Private Invitation</div>
    <h1 id="weddingAccessTitle">청첩장을 열어주세요</h1>
    <p id="weddingAccessMessage">초대받은 분만 입장할 수 있습니다.</p>
    <input id="weddingAccessPassword" type="password" autocomplete="current-password" placeholder="비밀번호를 입력해 주세요" aria-label="청첩장 비밀번호">
    <p class="wedding-access-error" id="weddingAccessError" role="alert"></p>
    <button id="weddingAccessButton" type="submit">청첩장 열기</button>
  </form>
</div>
<script type="application/json" id="wedding-data">{}</script>

<button id="bgmBtn" aria-label="배경음악 재생/정지">♪</button>
<audio id="bgmAudio" loop preload="none"></audio>

<div id="wrap"><div id="app"></div></div>

<div id="lightbox" role="dialog" aria-label="사진 크게 보기">
  <button class="lb-btn lb-close" aria-label="닫기">✕</button>
  <button class="lb-btn lb-prev" aria-label="이전">‹</button>
  <img id="lbImg" alt="">
  <button class="lb-btn lb-next" aria-label="다음">›</button>
  <div class="lb-count" id="lbCount"></div>
</div>

<div id="toast"></div>

<script>
(function(){
'use strict';

function hashPassword(value){
  if(!window.crypto||!window.crypto.subtle)return Promise.reject(new Error('이 브라우저에서는 비밀번호 기능을 사용할 수 없습니다.'));
  return window.crypto.subtle.digest('SHA-256',new TextEncoder().encode(value)).then(function(buffer){
    return Array.from(new Uint8Array(buffer)).map(function(byte){return byte.toString(16).padStart(2,'0');}).join('');
  });
}

function dismissWeddingAccess(){
  document.body.classList.remove('wedding-locked');
  document.getElementById('weddingAccessError').textContent='';
  document.getElementById('weddingAccessPassword').value='';
}

function requestWeddingAccess(D){
  var access=D&&D.access||{};
  if(!access.enabled||!access.passwordHash){dismissWeddingAccess();return Promise.resolve();}
  var sessionKey='wedding-access-'+access.passwordHash;
  try{if(sessionStorage.getItem(sessionKey)==='granted'){dismissWeddingAccess();return Promise.resolve();}}catch(e){}
  var form=document.getElementById('weddingAccessForm');
  var input=document.getElementById('weddingAccessPassword');
  var error=document.getElementById('weddingAccessError');
  document.getElementById('weddingAccessTitle').textContent=access.title||'청첩장을 열어주세요';
  document.getElementById('weddingAccessMessage').textContent=access.message||'초대받은 분만 입장할 수 있습니다.';
  document.getElementById('weddingAccessButton').textContent=access.buttonLabel||'청첩장 열기';
  input.placeholder=access.placeholder||'비밀번호를 입력해 주세요';
  document.body.classList.add('wedding-locked');
  setTimeout(function(){input.focus();},0);
  return new Promise(function(resolve){
    form.onsubmit=function(event){
      event.preventDefault();
      if(!input.value){error.textContent='비밀번호를 입력해 주세요.';return;}
      error.textContent='확인 중…';
      hashPassword(input.value).then(function(hash){
        if(hash!==access.passwordHash){error.textContent='비밀번호가 맞지 않습니다.';input.select();return;}
        try{sessionStorage.setItem(sessionKey,'granted');}catch(e){}
        dismissWeddingAccess();
        resolve();
      }).catch(function(err){error.textContent=err.message;});
    };
  });
}

function loadMapScript(id,src,isReady){
  if(isReady())return Promise.resolve();
  window.__mapSdkPromises=window.__mapSdkPromises||{};
  if(window.__mapSdkPromises[src])return window.__mapSdkPromises[src];
  window.__mapSdkPromises[src]=new Promise(function(resolve,reject){
    var old=document.getElementById(id);
    if(old)old.remove();
    var script=document.createElement('script');
    var settled=false;
    var timer=setTimeout(function(){finish(new Error('지도 연결 시간이 초과되었습니다.'));},7000);
    function finish(error){
      if(settled)return;settled=true;clearTimeout(timer);
      if(error){script.remove();delete window.__mapSdkPromises[src];reject(error);}
      else resolve();
    }
    script.id=id;script.async=true;script.src=src;
    script.onload=function(){isReady()?finish():finish(new Error('지도 서비스를 시작할 수 없습니다.'));};
    script.onerror=function(){finish(new Error('지도 서비스를 불러오지 못했습니다.'));};
    document.head.appendChild(script);
  });
  return window.__mapSdkPromises[src];
}

function initPreferredMap(D,renderToken){
  var container=document.getElementById('mapCanvas');
  if(!container)return;
  var config=D.map||{};
  var address=D.wedding.address||D.wedding.venue||'';
  var naverKey=String(config.naverClientId||'').trim();
  var kakaoKey=String(config.kakaoAppKey||(D.share&&D.share.kakaoKey)||'').trim();
  function active(){return window.__weddingRenderToken===renderToken&&container.isConnected;}
  function loading(name){if(active())container.innerHTML='<div class="map-loading">'+name+' 불러오는 중…</div>';}
  function badge(name){
    if(!active())return;
    var el=document.createElement('span');el.className='map-provider';el.textContent=name;container.appendChild(el);
  }
  function naverMap(){
    if(!naverKey)return Promise.reject(new Error('네이버 지도 키 없음'));
    loading('네이버 지도');
    var src='https://oapi.map.naver.com/openapi/v3/maps.js?ncpKeyId='+encodeURIComponent(naverKey)+'&submodules=geocoder';
    return loadMapScript('naver-map-sdk',src,function(){return !!(window.naver&&naver.maps&&naver.maps.Service);}).then(function(){
      return new Promise(function(resolve,reject){
        if(!active()){resolve();return;}
        var settled=false;
        var timer=setTimeout(function(){finish(new Error('네이버 주소 검색 시간 초과'));},6000);
        function finish(error){if(settled)return;settled=true;clearTimeout(timer);error?reject(error):resolve();}
        naver.maps.Service.geocode({query:address},function(status,response){
          if(settled)return;
          if(!active()){finish();return;}
          if(status!==naver.maps.Service.Status.OK){finish(new Error('네이버 주소 검색 실패'));return;}
          var item=response&&response.v2&&response.v2.addresses&&response.v2.addresses[0];
          if(!item){finish(new Error('네이버 지도 위치 없음'));return;}
          try{
            var position=new naver.maps.LatLng(Number(item.y),Number(item.x));
            container.innerHTML='';
            var map=new naver.maps.Map(container,{center:position,zoom:16,zoomControl:true});
            new naver.maps.Marker({position:position,map:map,title:D.wedding.venue||''});
            badge('네이버 지도');finish();
          }catch(error){finish(error);}
        });
      });
    });
  }
  function kakaoMap(){
    if(!kakaoKey)return Promise.reject(new Error('카카오 지도 키 없음'));
    loading('카카오맵');
    var src='https://dapi.kakao.com/v2/maps/sdk.js?appkey='+encodeURIComponent(kakaoKey)+'&autoload=false&libraries=services';
    return loadMapScript('kakao-map-sdk',src,function(){return !!(window.kakao&&kakao.maps&&kakao.maps.load);}).then(function(){
      return new Promise(function(resolve,reject){
        kakao.maps.load(function(){
          if(!active()){resolve();return;}
          try{
            var geocoder=new kakao.maps.services.Geocoder();
            var settled=false;
            var timer=setTimeout(function(){finish(new Error('카카오 주소 검색 시간 초과'));},6000);
            function finish(error){if(settled)return;settled=true;clearTimeout(timer);error?reject(error):resolve();}
            geocoder.addressSearch(address,function(result,status){
              if(settled)return;
              if(!active()){finish();return;}
              if(status!==kakao.maps.services.Status.OK||!result[0]){finish(new Error('카카오 주소 검색 실패'));return;}
              try{
                var position=new kakao.maps.LatLng(Number(result[0].y),Number(result[0].x));
                container.innerHTML='';
                var map=new kakao.maps.Map(container,{center:position,level:4});
                new kakao.maps.Marker({position:position,map:map,title:D.wedding.venue||''});
                badge('카카오맵');finish();
              }catch(error){finish(error);}
            });
          }catch(error){reject(error);}
        });
      });
    });
  }
  function googleMap(){
    if(!active())return;
    container.innerHTML='';
    var iframe=document.createElement('iframe');
    iframe.src='https://maps.google.com/maps?q='+encodeURIComponent(address)+'&z=16&hl=ko&output=embed';
    iframe.loading='lazy';iframe.title='Google 지도';
    container.appendChild(iframe);badge('Google 지도');
  }
  naverMap().catch(function(){if(active())return kakaoMap();}).catch(function(){if(active())googleMap();});
}

function esc(s){return String(s==null?'':s).replace(/[&<>"']/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];});}
function nl2br(s){return esc(s).replace(/\n/g,'<br>');}
function toast(msg){
  var t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');
  clearTimeout(t._tm);t._tm=setTimeout(function(){t.classList.remove('show');},1800);
}
function copyText(text,msg){
  function done(){toast(msg||'복사되었습니다');}
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).then(done,function(){fallback();});
  }else fallback();
  function fallback(){
    var ta=document.createElement('textarea');ta.value=text;ta.style.position='fixed';ta.style.opacity='0';
    document.body.appendChild(ta);ta.select();
    try{document.execCommand('copy');done();}catch(e){toast('복사에 실패했습니다');}
    document.body.removeChild(ta);
  }
}

  var cdD=document.getElementById('cdD'),cdH=document.getElementById('cdH'),
      cdM=document.getElementById('cdM'),cdS=document.getElementById('cdS'),
      cdMsg=document.getElementById('cdMsg');
  function pad(n){return n<10?'0'+n:''+n;}
  function tick(){
    var diff=WHEN-new Date();
    if(diff<=0){
      cdD.textContent=cdH.textContent=cdM.textContent=cdS.textContent='0';
      cdMsg.innerHTML='<b>'+esc(shortName(g.name))+' ♥ '+esc(shortName(b.name))+'</b>의 결혼식이 있는 날입니다 🎉';
      return;
    }
    var s=Math.floor(diff/1000);
    cdD.textContent=Math.floor(s/86400);
    cdH.textContent=pad(Math.floor(s%86400/3600));
    cdM.textContent=pad(Math.floor(s%3600/60));
    cdS.textContent=pad(s%60);
    cdMsg.innerHTML='<b>'+esc(shortName(g.name))+' ♥ '+esc(shortName(b.name))+'</b>의 결혼식이 <b>'+Math.ceil(diff/86400000)+'일</b> 남았습니다';
  }
  tick();window.__weddingCountdown=setInterval(tick,1000);
}

/* 복사 버튼들 */
var addrCopy=document.getElementById('addrCopy');
if(addrCopy)addrCopy.addEventListener('click',function(){copyText(D.wedding.address,'주소가 복사되었습니다');});
document.querySelectorAll('.acc-copy').forEach(function(el){
  el.addEventListener('click',function(){copyText(el.dataset.copy,'계좌번호가 복사되었습니다');});
});
document.querySelectorAll('.acc-head').forEach(function(el){
  el.addEventListener('click',function(){el.parentElement.classList.toggle('open');});
});

/* 공유 */
var pageUrl=(D.share&&D.share.url)||location.href.split('#')[0];
document.getElementById('btnCopyUrl').addEventListener('click',function(){copyText(pageUrl,'청첩장 주소가 복사되었습니다');});
document.getElementById('btnShare').addEventListener('click',function(){
  var title=D.share&&D.share.title?D.share.title:document.title;
  var text=D.share&&D.share.desc?D.share.desc:'';
  if(D.share&&D.share.kakaoKey&&window.Kakao){
    try{
      if(!Kakao.isInitialized())Kakao.init(D.share.kakaoKey);
      Kakao.Share.sendDefault({
        objectType:'feed',
        content:{title:title,description:text,imageUrl:(D.share.ogImageUrl?new URL(D.share.ogImageUrl,D.share.url||pageUrl).href:''),link:{mobileWebUrl:pageUrl,webUrl:pageUrl}},
        buttons:[{title:'청첩장 보기',link:{mobileWebUrl:pageUrl,webUrl:pageUrl}}]
      });
      return;
    }catch(e){}
  }
  if(navigator.share){
    navigator.share({title:title,text:text,url:pageUrl}).catch(function(){});
  }else{
    copyText(pageUrl,'주소가 복사되었습니다. 붙여넣어 공유해 주세요!');
  }
});
if(D.share&&D.share.kakaoKey){
  if(!document.getElementById('kakao-sdk')){
    var ks=document.createElement('script');
    ks.id='kakao-sdk';
    ks.src='https://t1.kakaocdn.net/kakao_js_sdk/2.7.4/kakao.min.js';
    ks.crossOrigin='anonymous';
    document.head.appendChild(ks);
  }
}

/* 배경음악 */
if(D.bgm&&D.bgm.src){
  var audio=document.getElementById('bgmAudio'),btn=document.getElementById('bgmBtn');
  audio.src=D.bgm.src;btn.classList.add('show');
  function setIcon(){btn.textContent=audio.paused?'♪':'♫';btn.classList.toggle('playing',!audio.paused);}
  btn.addEventListener('click',function(){
    if(audio.paused)audio.play().then(setIcon).catch(function(){toast('재생할 수 없습니다');});
    else{audio.pause();setIcon();}
  });
  audio.addEventListener('play',setIcon);audio.addEventListener('pause',setIcon);
  if(D.bgm.autoplay){
    audio.play().then(setIcon).catch(function(){
      var once=function(){audio.play().then(setIcon).catch(function(){});
        document.removeEventListener('touchstart',once);document.removeEventListener('click',once);};
      window.__weddingAutoplayOnce=once;
      document.addEventListener('touchstart',once,{once:true});
      document.addEventListener('click',once,{once:true});
    });
  }
}
}

var previewReceived=false;
window.addEventListener('message',function(event){
  if(event.data&&event.data.type==='WEDDING_PREVIEW'&&event.data.content){
    previewReceived=true;
    try{dismissWeddingAccess();renderWedding(event.data.content);}catch(error){
      document.getElementById('app').innerHTML='<section><div class="sec-title">미리보기를 표시할 수 없습니다</div><p style="text-align:center">'+String(error.message)+'</p></section>';
    }
  }
});

fetch('content.json?v='+Date.now())
  .then(function(response){if(!response.ok)throw new Error('content.json을 불러오지 못했습니다.');return response.json();})
  .then(function(data){if(!previewReceived)return requestWeddingAccess(data).then(function(){if(!previewReceived)renderWedding(data);});})
  .catch(function(error){
    if(previewReceived)return;
    document.getElementById('app').innerHTML='<section><div class="sec-title">청첩장을 불러오지 못했습니다</div><p style="text-align:center">'+String(error.message)+'</p></section>';
  });
})();
</script>
</body>
</html>
